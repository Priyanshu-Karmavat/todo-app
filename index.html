<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do UI Upgrade</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="main">
    <h1>Basic To-Do</h1>

    <div class="inner">
      <p id="taskCounter"></p>
      <div id="inputContainer">
        <input id="addInput" type="text" placeholder="Add task here..">
        <input id="searchInput" type="text" placeholder="Search tasks...">
      </div>
      <button class="addBtn">Add Task</button>
    </div>

    <div class="items">
      <ul class="list"></ul>
    </div>
    <button class="deleteAllBtn">Delete All Task</button>
  </div>



  <script src="index.js"></script>
</body>

</html>
